<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - VideoBelajar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">

    <header class="container mx-auto px-6 py-6 md:py-8">
    <a href="index.html" class="inline-block hover:opacity-80 transition">
        <h3 class="text-xl font-black tracking-tight text-emerald-600">
            video<span class="text-indigo-600">belajar</span>
        </h3>
    </a>
</header>

    <main class="flex-grow flex items-center justify-center px-4 py-6 relative overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-indigo-500/5 rounded-full blur-2xl -z-10"></div>
        <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-emerald-500/5 rounded-full blur-2xl -z-10"></div>

        <div class="bg-white border border-slate-100 rounded-3xl p-8 max-w-md w-full shadow-xl shadow-slate-200/50">
            <div class="space-y-1 text-center mb-8">
                <h4 class="text-2xl font-black tracking-tight text-slate-900">Masuk ke Akun</h4>
                <p class="text-xs text-slate-400">Yuk, lanjutin belajarmu di platform VideoBelajar.</p>
            </div>

            <form class="space-y-5">
                <div>
                    <label for="email" class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wider">E-Mail <span class="text-rose-500">*</span></label>
                    <input type="email" id="email" required placeholder="Masukkan email aktif Anda" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Kata Sandi <span class="text-rose-500">*</span></label>
                        <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-500 transition">Lupa Password?</a>
                    </div>

                    <div>
                        <div class="relative">
                            <input type="password" id="password" required placeholder="Masukkan kata sandi akun" class="w-full pl-4 pr-12 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
    
                            <button type="button" id="togglePassword" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600 text-xs font-semibold">
                            Lihat
                        </button>
                    </div>
                </div>

                <div class="space-y-2 pt-2">
                <button type="submit" class="block w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-center py-3 rounded-xl text-sm transition shadow-md shadow-indigo-600/20">
                Login
                </button>
    
                <a href="register.html" class="block w-full bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 font-bold text-center py-3 rounded-xl text-sm transition">
                Belum punya akun? Daftar gratis
                 </a>
                </div>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-xs font-medium">atau gunakan</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>

                <div>
                    <button type="button" class="w-full flex items-center justify-center gap-2.5 border border-slate-200 hover:bg-slate-50 py-3 rounded-xl text-sm text-slate-700 font-semibold transition shadow-sm">
                        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_1x_web_24dp.png" alt="Google Logo" class="w-4 h-4">
                        Masuk lewat Google
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center text-[11px] text-slate-400 border-t border-slate-100 bg-white">
        &copy; 2026 VideoBelajar. Hak Cipta Dilindungi Undang-Undang.
    </footer>

    <script>
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');

    togglePasswordBtn.addEventListener('click', function () {
        // Tukar tipe input antara password dan text
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Ubah teks tombol
        this.textContent = type === 'password' ? 'Lihat' : 'Sembunyikan';
    });
</script>

<script>
        // Memastikan kode baru berjalan setelah semua elemen HTML selesai dimuat
        document.addEventListener('DOMContentLoaded', function() {
            const formLogin = document.querySelector('form');
            
            if (formLogin) {
                formLogin.addEventListener('submit', function (event) {
                    // 1. Tahan refresh halaman bawaan browser
                    event.preventDefault(); 
                    
                    console.log("Tombol login berhasil ditekan dan form tervalidasi!");
                    
                    // 2. Alihkan langsung ke halaman beranda
                    window.location.href = 'index.html';
                });
            } else {
                console.error("Gagal menemukan elemen <form> di halaman ini.");
            }
        });
    </script>
</body>

</body>
</html>
